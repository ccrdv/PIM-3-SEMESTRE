version: '3.8'

services:
  redis:
    image: redis:7.4-alpine        
    container_name: redis-sessoes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server 
      --appendonly yes 
      --requirepass "123"   
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  redis_data:
