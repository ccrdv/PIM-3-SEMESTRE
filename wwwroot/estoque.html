<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comercial Morro - Estoque</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

    <div class="container-principal">
        <nav class="menu-lateral">
            <div class="logo">
                <h1>COMERCIAL MORRO</h1>
                <span>Sistema de Vendas</span>
            </div>
            <ul class="lista-menu">
                <li class="item-menu ativo" id="menuInicio" onclick="clickInicio()"><i class="fa-solid fa-house"></i>  Início</li>
                <li class="item-menu" id="menuVenda" onclick="clickMenuVenda()"><i class="fa-solid fa-cart-shopping"></i>  Vendas</li>
                <li class="item-menu" id="menuEstoque" onclick="clickMenuEstoque()"><i class="fa-brands fa-stack-overflow"></i>  Estoque</li>
                <li class="item-menu" id="menuProdutos" onclick="clickMenuProdutos()"><i class="fa-brands fa-product-hunt"></i>  Produtos</li>
                <li class="item-menu" id="menuClientes" onclick="clickMenuClientes()"><i class="fa-solid fa-user-group"></i>  Clientes</li>
                <li class="item-menu" id="menuFiado" onclick="clickMenuFiado()"><i class="fa-solid fa-sack-dollar"></i>  Fiados</li>
            </ul>
        </nav>

        <main class="conteudo">
            <header class="cabecalho">
                <h2>Estoque</h2>
                <p>Visualize e gerencie o estoque de produtos</p>
            </header>

            <section class="grade-cards">
            <div class="card-info">
                <div class="icone-circular azul-claro"><i class="fa-solid fa-box-open"></i></div>
                <div>
                    <p class="titulo-card">Total de Produtos</p>
                    <span class="valor-card" id="totalProdutos">0</span>
                </div>
            </div>
            <div class="card-info">
                <div class="icone-circular vermelho"><i class="fa-solid fa-exclamation"></i></div>
                <div>
                    <p class="titulo-card">Baixo Estoque</p>
                    <span class="valor-card" id="baixoEstoque">0</span>
                </div>
            </div>
            <div class="card-info">
                <div class="icone-circular verde"><i class="fa-solid fa-box-open"></i></div>
                <div>
                    <p class="titulo-card">Valor Total</p>
                    <span class="valor-card" id="valorTotalEstoque">R$ 0,00</span>
                </div>
            </div>
        </section>

        <section class="barra-filtros">
            <input type="text" id="buscaProduto" placeholder="Buscar produto..." class="campo-busca">
            <div class="botoes-filtro" id="filtrosCategoria">
                <button class="filtro ativo" data-categoria="todas">Todas</button>
                <!-- Os botões de categoria serão carregados dinamicamente -->
            </div>
        </section>

        <section class="container-tabela">
            <table class="tabela-estoque">
                <thead>
                    <tr>
                        <th>PRODUTO</th>
                        <th>CATEGORIA</th>
                        <th>PREÇO</th>
                        <th>ESTOQUE</th>
                        <th>VALOR TOTAL</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="tabelaEstoqueBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px;">
                            Carregando produtos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
        </main>
    </div>
    <script src="script.js"></script>
        <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
</body>
</html>
