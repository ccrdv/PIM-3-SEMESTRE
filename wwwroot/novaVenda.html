<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Comercial Morro - Nova Venda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

    <div class="container-principal">
        <nav class="menu-lateral">
            <div class="logo">
                <h1>COMERCIAL MORRO</h1>
                <span>Sistema de Vendas</span>
            </div>
            <ul class="lista-menu">
                <li class="item-menu" id="menuInicio" onclick="clickInicio()"><i class="fa-solid fa-house"></i>  Início</li>
                <li class="item-menu ativo" id="menuVenda" onclick="clickMenuVenda()"><i class="fa-solid fa-cart-shopping"></i>  Vendas</li>
                <li class="item-menu" id="menuEstoque" onclick="clickMenuEstoque()"><i class="fa-brands fa-stack-overflow"></i>  Estoque</li>
                <li class="item-menu" id="menuProdutos" onclick="clickMenuProdutos()"><i class="fa-brands fa-product-hunt"></i>  Produtos</li>
                <li class="item-menu" id="menuClientes" onclick="clickMenuClientes()"><i class="fa-solid fa-user-group"></i>  Clientes</li>
                <li class="item-menu" id="menuFiado" onclick="clickMenuFiado()"><i class="fa-solid fa-sack-dollar"></i>  Fiados</li>
            </ul>
        </nav>

        <main class="conteudo">
            <header class="cabecalho">
                <h2>Nova Venda</h2>
                <p>Registre uma nova venda</p>
            </header>

            <div class="layout-venda">
                <div class="coluna-esquerda">
                    <section class="cartao-venda">
                        <h3>Adicionar Produtos</h3>
                        
                        <div class="grupo-campo">
                            <label>Buscar Produto</label>
                            <input type="text" id="buscarProduto" placeholder="Digite para buscar..." class="campo-texto">
                        </div>

                        <div class="linha-formulario">
                            <div class="grupo-campo flex-3">
                                <label>Produto</label>
                                <select id="selectProduto" class="campo-selecao">
                                    <option value="">Selecione um produto</option>
                                </select>
                            </div>
                            <div class="grupo-campo flex-1">
                                <label>Quantidade</label>
                                <input type="number" id="quantidadeProduto" value="1" min="1" class="campo-texto">
                            </div>
                            <button class="botao-adicionar" onclick="adicionarAoCarrinho()">Adicionar</button>
                        </div>
                    </section>

                    <section class="cartao-venda carrinho-container">
                        <h3>Carrinho (<span id="totalItens">0</span> itens)</h3>
                        <div id="carrinhoLista" class="carrinho-vazio">
                            <p>Carrinho vazio</p>
                        </div>
                    </section>
                </div>

                <aside class="coluna-direita">
                    <section class="cartao-venda">
                        <h3>Pagamento</h3>
                        
                        <div class="grupo-campo">
                            <label>Forma de Pagamento</label>
                            <select id="formaPagamento" class="campo-selecao">
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Pix">Pix</option>
                                <option value="Fiado">Fiado</option>
                            </select>
                        </div>

                        <div class="grupo-campo" id="clienteFiadoGroup" style="display: none;">
                            <label>Cliente (para fiado)</label>
                            <select id="clienteFiado" class="campo-selecao">
                                <option value="">Selecione um cliente</option>
                            </select>
                        </div>

                        <hr class="divisor">

                        <div class="linha-total">
                            <span>Subtotal:</span>
                            <strong id="subtotal">R$ 0,00</strong>
                        </div>
                        <div class="linha-total destaque-total">
                            <span>Total:</span>
                            <strong id="totalVenda">R$ 0,00</strong>
                        </div>

                        <button class="botao-finalizar" onclick="finalizarVenda()">Finalizar Venda</button>
                    </section>
                </aside>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
</body>
</html>
